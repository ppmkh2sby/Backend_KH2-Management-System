# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET SDK from global.json
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        
    - name: Show .NET info
      run: dotnet --info

    - name: Restore dependencies
      run: dotnet restore KH2.ManagementSystem.slnx

    - name: Build
      run: dotnet build KH2.ManagementSystem.slnx --configuration Release --no-restore

    - name: Test
      run: dotnet test KH2.ManagementSystem.slnx --configuration Release --no-build --verbosity normal
